spring:
  datasource:
    url: jdbc:h2:mem:expensetracker_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

  sql:
    init:
      platform: h2

  h2:
    console:
      enabled: true
      path: /h2-console

  # Disabled flyway in DEV to let hibernate handle ddl-auto create-drop cleanly
  flyway:
    enabled: false
